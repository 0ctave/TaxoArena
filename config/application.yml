spring:
  application:
    name: taxoadapt-arc-engine

# JVM options for TUI mode
jvm:
  args:
    - --add-opens=java.base/java.awt.X11.XCBResources=ALL-UNNAMED
    - --add-opens=java.base/java.awt=X11GraphicsDevicePermission$ResourcePermission=ALL-UNNAMED
    - --add-opens=java.desktop/java.awt=ALL-UNNAMED
    - -Djava.awt.headless=false
    - -Djava.awt.graphicsenv=true
    - -Dfile.encoding=UTF-8
    - -Djava.io.tmpdir=/tmp
    - -Dawt.toolkit=sun.awt.X11.XToolkit
    - -Dsun.java2d.uiScale=1.0
    - -Dsun.java2d.xrender=true
    - -Dline.editor.buffer-size=65536
    - -Dline.ui.max-width=1920
    - -Dline.ui.max-height=1080

arc:
  ollama:
    base-url: http://localhost:11434
    num-ctx: 8192
  ai:
    clients:
      - id: ministral
        modelName: ministral-3:14b
        client: ollama
        url: http://localhost:11434
      - id: qwen3.5
        modelName: qwen3.5:2b
        client: ollama
        url: http://localhost:11434

huggingface:
  token: ***REMOVED***

taxoadapt:
  execution:
    run-batch: false
    calibrate: false
    start-service: true
    num-iterations: 5
    enable-distillation: false
    enable-visualization: false
    enable-tui: true

  dataset:
    sample: 12000
    split-dataset: true
    test-split-ratio: 0.2
    selected-domains: []

  llm:
    provider: AZURE
    embedding-provider: OLLAMA
    embedding-model: "embeddinggemma:latest"
    judge-model: "Mistral-Large-3"
    labeling-model: "Mistral-Large-3"
    max-judge-generality: 1  # 0=leaves only, 1=leaves+parents, 2=leaves+parents+grandparents
    gemini:
      api-key: ""
      model-name: "gemini-1.5-flash"
    azure:
      endpoint: "***REMOVED***"
      api-key: "***REMOVED***"
      deployment-name: "Mistral-Large-3"
      embedding-deployment-name: ""
      api-version: "2024-02-15-preview"

  persistence:
    load-path: "taxonomy_final.json"
    save-path: "taxonomy_final.json"

  # --- Advanced Mathematical Formalism Controls ---

  formalism:
    # Graph Limits
    max-depth: 6

    # Hysteresis Likeness Factors (Probabilities)
    tau-fit: 0.88
    tau-reparent: 0.80
    tau-merge: 0.92
    
    # Balanced: 1.2 scaling allows API queries to pass restrictive gates
    inclusion-scaling-factor: 1.2

    # Context-Aware Density (Depth Decay)
    split-base-threshold: 25
    depth-decay-lambda: 0.08

    # Splitting Compression (p-BIC)
    p-bic-lambda: 0.005

    # GMM / HMM Multi-Centroid Parameters
    max-centroids-per-node: 3
    relative-max-size: 0.7

    # Branching Control (Set to <= 0 for all viable)
    max-trickle-branches: -1

    max-assignments-per-query: 2

    # MRL Routing configuration
    enable-mrl: true
    fixed-mrl-dimension: 384
