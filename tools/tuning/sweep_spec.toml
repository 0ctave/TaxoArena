[base]
config = "experiment_configs/thesis_canonical.toml"
gradle_cmd = "gradlew.bat bootRun"  # For Windows execution
extra_args = ""

[output]
runs_dir = "tuning/runs"
combined_ledger = "tuning/combined_ledger.csv"

[screening]
design = "L9_3_4"
seed = 42
stage = "screen"

[finalists]
seeds = [137, 2048]
stage = "validate"

# Factor -> {level1, level2, level3}; mapped onto Taguchi L9 columns A..D
[factors]
assignmentCosineGap = [0.10, 0.15, 0.20]
deltaAssign         = [0.5, 1.0, 2.0]
minClusterSize      = [50, 75, 100]
routingSoftmaxTau   = [1.0, 1.5, 2.0]

[gates.hard]
Acyclic = true
DuplicateBridgeCount = 0
OrphanCount = 0

[gates.soft]
AvgMatchCount_band = [1.5, 4.0]
RoutingECE_le = 0.15
