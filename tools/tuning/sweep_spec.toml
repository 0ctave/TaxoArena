[base]
config = "experiment_configs/thesis_canonical.toml"
gradle_cmd = "gradlew.bat bootRun --rerun-tasks"  # For Windows
extra_args = ""

[output]
runs_dir = "tuning/runs"
combined_ledger = "tuning/combined_ledger.csv"

[screening]
design = "L9_3_4"
seed = 42
stage = "screen"

[finalists]
seeds = [137, 2048]
stage = "validate"

# ══════════════════════════════════════════════════════════════════════════
#  FRESH CALIBRATION SWEEP — κ‑ADAPTIVE MARGIN REGIME
#
#  Base: corrected construction path
#   - N-normalized EM tolerance + adaptive cap + plateau guard
#   - fusionSimilarityThreshold = 0.90
#   - runBaselines = false during screening
#
#  FACTORS (match code + current geometry):
#
#   - deltaAssign {0.0015, 0.003, 0.005}
#       Legacy alias for constructionMargin; controls unified log-softmax
#       margin during DAG-building trickle (effectiveMargin = deltaAssign
#       × siblingKappa, siblingKappa ∈ [1,100]).
#       These levels correspond roughly to effective margins:
#         κ = 100 → 0.15, 0.30, 0.50 nats
#         κ = 60  → 0.09, 0.18, 0.30 nats
#       i.e. tight, canonical, and slightly looser regimes around the
#       empirically winning value (≈0.002–0.003 on the corrected base).
#
#   - minClusterSize {25, 50, 75}
#       Granularity dial: 50 is canonical; 25/75 probe finer vs coarser
#       splits, trading leaf count against SmallLeafFraction and
#       SelectedNodeStarvedLeafFraction.
#
#   - secondaryMassFloor {2.0, 3.5, 5.0}
#       Minimum secondary probability mass for a candidate to count
#       (bridge / secondary-structure control). Now correctly reported
#       in the ledger; no longer unreadable.
#
#   - bridgeSupportRelFraction {0.03, 0.05, 0.10}
#       Relative support threshold a bridge must carry vs its parent.
#       0.10 coincides with the canonical DAG; 0.03/0.05 explore weaker
#       bridges’ impact on DuplicateBridgeCount, SourceBPerAnchorMean,
#       and bridge stability.
#
#  NOT SWEPT:
#   - routingSoftmaxTau (held at 1.5 as in thesis_canonical.toml)
#   - assignmentCosineGap (diagnostics-only nats margin, not used in
#     primary routing; left at canonical value).
#
#  BorderlineRate is reported but not gated. Calibration is gated by
#  RoutingECE and the soft gates below.
# ══════════════════════════════════════════════════════════════════════════

[factors]
deltaAssign              = [0.0015, 0.003, 0.005]
minClusterSize           = [25, 50, 75]
secondaryMassFloor       = [2.0, 3.5, 5.0]
bridgeSupportRelFraction = [0.03, 0.05, 0.10]

[gates.hard]
Acyclic = true
DuplicateBridgeCount = 0
OrphanCount = 0
has_depth2_sourceB = false
MaxAssignmentCapRate_le = 0.20
SmallLeafFraction_le = 0.50
SelectedNodeStarvedLeafFraction_le = 0.20
SourceBPerAnchorMean_le = 3.0

[gates.soft]
AvgMatchCount_band = [1.0, 4.0]
Top1Accuracy_ge = 0.72
RoutingECE_le = 0.15
CrossAnchorMigrationRate_band = [0.10, 0.30]
CanonicalAdaptedJaccard_band = [0.0, 1.0]