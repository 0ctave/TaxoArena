[base]
config = "experiment_configs/thesis_canonical.toml"
gradle_cmd = "gradlew.bat bootRun"  # For Windows execution
extra_args = ""

[output]
runs_dir = "tuning/runs"
combined_ledger = "tuning/combined_ledger.csv"

[screening]
design = "L9_3_4"
seed = 42
stage = "screen"

[finalists]
seeds = [137, 2048]
stage = "validate"

# Recalibration sweep — run now that DuplicateBridgeCount is fixed (commit cb70407:
# grouping now requires non-empty parents AND matches on parent-set + child-set
# jointly, instead of collapsing all empty-child bridges into one false duplicate
# group). The prior L9 batch's near-universal hard-gate failures were partly
# contaminated by that bug, so this sweep restores full previously-tested ranges
# instead of narrowing, to avoid prematurely discarding configs that were
# incorrectly failed last time.
#
# deltaAssign: widened back to {1.0, 2.0, 4.0, 7.0} conceptually, but kept as a
# 3-level factor for L9 compatibility -> {1.0, 2.0, 4.0}. This refills the
# 2.0-4.0 gap skipped in the previous batch (which jumped straight to 4.0/10.0)
# while dropping 10.0, which only ever demonstrated MaxAssignmentCapRate failure
# and gave no new gradient information.
#
# routingSoftmaxTau and minClusterSize: reverted to their full original ranges
# rather than the narrowed bands considered previously, since conclusions about
# their effect on ECE/borderline were drawn while the duplicate-bridge gate was
# still unreliable and may have been distorted.
#
# assignmentCosineGap: unchanged; this factor was never implicated in the bug
# and prior sweep notes already confirmed only a weak effect on borderline/ECE.
[factors]
assignmentCosineGap = [0.10, 0.15, 0.20]
deltaAssign         = [1.0, 2.0, 4.0]
minClusterSize      = [50, 75, 100]
routingSoftmaxTau   = [1.0, 1.5, 2.0]

[gates.hard]
Acyclic = true
DuplicateBridgeCount = 0
OrphanCount = 0
has_depth2_sourceB = false
MaxAssignmentCapRate_le = 0.20
SmallLeafFraction_le = 0.50
SelectedNodeStarvedLeafFraction_le = 0.20
SourceBPerAnchorMean_le = 3.0

[gates.soft]
AvgMatchCount_band = [1.0, 4.0]
Top1Accuracy_ge = 0.74
RoutingECE_le = 0.15
BorderlineRate_band = [0.20, 0.35]
CrossAnchorMigrationRate_band = [0.10, 0.30]
CanonicalAdaptedJaccard_band = [0.0, 1.0]