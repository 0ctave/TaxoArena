# ══════════════════════════════════════════════════════════════════════════
#  thesis_dagmax_test.toml
#  PURPOSE: Focused test run configuration for taxonomy DAG generation
#           using the simplified 12-parameter thesis formalization, dynamic
#           temperature scaling, and optimized bridge formation gates.
# ══════════════════════════════════════════════════════════════════════════

datasetType   = "MMLU_PRO"
models        = ["gpt-4o-2024-08-06"]
category      = ""
queryLimit    = 0
outputDir     = "experiment_results/thesis_dagmax_test"
testRatio     = 0.3
seed          = 42

# ── Execution switches (DAG generation focused, no labeling/benchmark) ──
runPipeline    = true
runBenchmark   = false
runTrickle     = true
judgeInduction = false
enableLabeling = false
runBaselines   = false

# ── Thesis Mode Switch ───────────────────────────────────────────────────
dagMode = "DAG_MAX"   # Automatically enables stable IDs, residual routing & split gates, bridging, and refitting

# ── Formalism Parameters (Thesis 12-knob set) ───────────────────────────
maxDepth                  = 8
minClusterSize            = 50
separationEpsilon         = 0.01
routingSoftmaxTau         = 1.50
tauKappaScalingFactor     = 0.0    # Dynamic temperature power gamma (0.0 = unscaled, ablatable via {0.0, 0.5, 1.0})
assignmentCosineGap       = 0.15   # Primary soft-membership margin (governs bridge formation)
deltaAssign               = 1.0    # Residual soft-assignment threshold
fusionSimilarityThreshold = 0.92
effectiveSupportFloor     = 2.0
defaultKappaPrior         = 10.0
numIterations             = 35
