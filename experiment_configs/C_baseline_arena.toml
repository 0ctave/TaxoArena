# C_baseline_arena.toml  —  OPTIONAL: arena ranking on flat baselines
datasetType = "MMLU_PRO"
models = [   # use the 8-model list to contain cost at M=12
    "gpt-4o-2024-08-06", "claude-3-5-sonnet-20241022", "gemini-1.5-pro-002",
    "Meta-Llama-3_1-70B-Instruct", "Qwen1.5-72B-Chat", "gpt-4o-mini",
    "Mixtral-8x7B-Instruct-v0.1", "Meta-Llama-3_1-8B-Instruct"
]
category = ""
queryLimit = 0
outputDir = "experiment_results/baseline_arena_m8"
testRatio = 0.3
seed = 42
runPipeline   = true
runBenchmark  = true
runTrickle    = false
judgeInduction = false   # baselines use generic prompts (see critique F7)
conditions = ["KMEANS_BASELINE", "WARD_BASELINE", "RANDOMNULL_BASELINE"]

dagMode                   = "TREE_BASELINE"
maxDepth                  = 8
minClusterSize            = 50
separationEpsilon         = 0.01
routingSoftmaxTau         = 1.50
assignmentCosineGap       = 0.15
deltaAssign               = 1.0
emaAlpha                  = 0.7
fusionSimilarityThreshold = 0.92
effectiveSupportFloor     = 2.0
defaultKappaPrior         = 10.0
enableLabeling            = true
numIterations             = 35