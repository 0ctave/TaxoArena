# ══════════════════════════════════════════════════════════════════════════
#  dagmax_arena_on.toml
#  PURPOSE: Same as dagmax_feature_on but with the arena/benchmark enabled.
#           Verify the arena competitor set is leaves-only (bridge nodes carry
#           isBridge and no queries, so they are never entered as arena leaves)
#           and that bridge-level utility is only produced via post-hoc
#           C2-style aggregation — never as a first-class arena competitor.
#  COST:    EXPENSIVE. runBenchmark=true drives real LLM arena calls, and
#           judgeInduction=true is REQUIRED here: with runBenchmark=true under
#           the MAIN condition, HeadlessBenchmarkRunner.kt:249 throws if a leaf
#           has no induced judge prompt/rubric. Run this LAST, after the two
#           free runs pass.
# ══════════════════════════════════════════════════════════════════════════

datasetType   = "MMLU_PRO"
models        = ["gpt-4o-2024-08-06", "Meta-Llama-3_1-8B-Instruct"]
category      = ""
queryLimit    = 0
outputDir     = "experiment_results/dagmax_arena_on"
testRatio     = 0.3
seed          = 42

# ── Pipeline / evaluation switches ──────────────────────────────────────────
runPipeline    = true
runBenchmark   = true    # ⚠ arena on → LLM cost
runTrickle     = true
judgeInduction = true    # ⚠ REQUIRED when runBenchmark=true (induces leaf judges) → LLM cost
enableLabeling = true    # optional; nicer bridge/cluster labels (extra LLM cost)

# ── Core formalism (identical to the other two configs) ──────────────────────
maxDepth          = 8
minClusterSize    = 25
separationEpsilon = 0.04
cosineTau         = 2.0
tauFunnelFloor    = 0.90
# assignmentGap is deprecated/unused in favor of assignmentCosineGap
# assignmentGap     = 0.05
emaAlpha          = 0.7

# ── Adaptive soft-membership params ──────────────────────────────────────────
assignmentCosineGap     = 0.03
deltaAssign             = 0.20
maxLeafAssignments      = 5
refitMuPerIteration     = false

# ── DAG-Max flags: ALL ON ─────────────────────────────────────────────────────
enableStableQuestionIds = true
enableResidualRouting   = true
enableResidualSplitGate = true
enableBridging          = true

# ── DAG-Max parameters (handout defaults) ─────────────────────────────────────
# routeConfidenceTau is deprecated/unused in favor of depth-adaptive tau funnels
# routeConfidenceTau      = 0.5
bridgeSeparationCeiling = 0.20
bridgeEntropyCap        = 1.05
bridgeMaxArity          = 2
bridgeParentBudget      = 1
maxBridgeNodes          = 14
maxBridgesPerDomainPair = 2
bridgeCandidateTopK     = 10
minBridgeCoverage       = 50
numIterations           = 15
