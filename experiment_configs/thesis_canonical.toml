# ══════════════════════════════════════════════════════════════════════════
#  thesis_canonical.toml — FINAL CANONICAL DAG BUILD
#
#  This config builds the single canonical taxonomy reported in the thesis.
#  It encodes the seed-validated winning configuration from the L9 calibration
#  (run val_69af462a: top result on BOTH finalist seeds 137 & 2048), on the
#  corrected construction pipeline (converged EM, fixed bridge + dendrogram
#  metrics).
#
#  This is NOT a sweep base. The four calibrated factors below are set to their
#  winning values, not swept. Build once; the resulting snapshot is the
#  canonical DAG the arena evaluates.
#
#  Pipeline provenance (all fixes applied): EM convergence normalized by N with
#  adaptive iteration cap (150) + plateau guard; DuplicateBridge / SourceA/B
#  metrics computed from real multi-parent structure; DendrogramPurity computed
#  fractionally with consistent traversal policy. Confirmed on this base:
#  0 selected splits on non-converged fits, all 14 domains split with strong
#  Dasgupta deltas, early-stopping at a stable fixed point (~iter 15 of 35).
# ══════════════════════════════════════════════════════════════════════════

datasetType   = "MMLU_PRO"

# Evaluated model roster (16 models spanning capability tiers, frontier -> small).
# Held fixed across all conditions; the arena ranks these within each leaf.
models        = [
    "gpt-4o-2024-08-06",
    "claude-3-5-sonnet-20241022",
    "gemini-1.5-pro-002",
    "deepseek-chat-v2_5",
    "Meta-Llama-3_1-70B-Instruct",
    "Qwen1.5-72B-Chat",
    "gpt-4o-mini",
    "claude-3-5-haiku-20241022",
    "Mixtral-8x7B-Instruct-v0.1",
    "c4ai-command-r-v01",
    "Qwen1.5-14B-Chat",
    "Meta-Llama-3_1-8B-Instruct",
    "gemini-1.5-flash-002",
    "Llama-2-70b-hf",
    "Llama-2-13b-hf",
    "Meta-Llama-3-70B-Instruct"
]

category      = ""      # "" = all 14 MMLU-Pro domains (empty = no category filter)
queryLimit    = 0       # 0 = no cap; use the full corpus
outputDir     = "experiment_results/thesis_canonical"
testRatio     = 0.3     # frozen 70/30 stratified split; the 30% held-out pool is
# reserved for arena evaluation and excluded from construction
seed          = 42      # construction seed; finalist seeds (137, 2048) validated
# this config's stability separately

# ── Pipeline / evaluation switches ──────────────────────────────────────────
runPipeline    = true    # build the DAG
runBenchmark   = false   # arena runs as a SEPARATE step against the persisted
# snapshot (MAIN must run first to emit frozen triples)
runTrickle     = true    # produce the routing/validity ledger (purity, ECE, etc.)
judgeInduction = false   # judges are induced in the arena step, not here
enableLabeling = false   # LLM cluster labeling off for the structural build
runBaselines   = false

# ── Construction mode ───────────────────────────────────────────────────────
dagMode = "DAG_MAX"      # full polyhierarchy: enables bridging (multi-parent
# nodes). DAG_MAX sets enableBridging = true.

# ── Formalism parameters ─────────────────────────────────────────────────────
#  NOTE: several values below deliberately differ from the code defaults; the
#  rationale is given per line. The four CALIBRATED factors are marked [L9].

maxDepth              = 8      # max taxonomy depth (code default 12). 8 is ample
# given observed avg leaf depth ~3.2; caps runaway
# recursion without truncating real structure.

minClusterSize        = 50     # min queries for a node to split further (code
# default 25). 50 raised to avoid over-fragmentation
# into tiny, low-support leaves (keeps SmallLeafFraction
# near 0). Governs leaf granularity (r=-0.95 w/ leaf count).

separationEpsilon     = 0.01   # JS-divergence floor for a passthrough collapse /
# split acceptance (code default 0.04). Lowered to
# allow finer legitimate separations at d=256.

routingSoftmaxTau     = 1.50   # base temperature for the trickle-routing softmax
# (code default 1.0). 1.5 softens routing slightly;
# effective temperature is tau * kappa^gamma.

tauKappaScalingFactor = 0.0    # gamma: exponent coupling routing temperature to
# cluster concentration kappa (tau_eff = tau*kappa^gamma).
# 0.0 = unscaled canonical setting; ablated separately
# in {0.0, 0.5, 1.0} for the geometry-adaptation study.

emaAlpha              = 0.7    # EMA smoothing for kappa across iterations (code
# default 0.7). Stabilizes concentration estimates
# between evolution passes; kept at default.

effectiveSupportFloor = 2.0    # min effective (soft) support for a node to be
# retained (code default 2.0). Guards against
# near-empty nodes surviving on fractional mass.

defaultKappaPrior     = 10.0   # NiW prior concentration when a node has too few
# points for a stable MLE (code default 10.0). Weak
# prior; only dominates in the tiny-N regime.

numIterations         = 35     # max evolution passes. Early-stopping typically
# fires ~iter 15 at a stable fixed point; 35 is the
# ceiling, rarely reached.

maxLeafAssignments    = 5      # max leaves a single query may be softly assigned
# to during arena-time routing (multi-membership cap).

# ── Calibrated factors (winning L9 configuration) ───────────────────────────
assignmentCosineGap       = 0.15   # [L9] soft-membership margin: how close a
# secondary leaf must be (in cosine) to the best
# to also receive the query. Code default 0.03;
# 0.15 is the winning value. Weak effect on ECE,
# stronger on Top-1 / cross-anchor migration.

deltaAssign               = 0.002   # [L9] log-softmax margin controlling routing-walk
# breadth (how softly a query trickles into
# multiple branches). Code default 0.20; 1.25 was old; 0.002 is winning adaptive scale.
# calibration against assignment-cap pressure.

secondaryMassFloor        = 2.0    # [L9] minimum secondary probability mass for a
# secondary (bridge-candidate) assignment to count.
# Code default 5.0; 2.0 is the winning value —
# more permissive to secondary structure.

bridgeSupportRelFraction  = 0.10   # [L9] relative support a bridge must carry vs its
# parent to be admitted. Code default 0.10 (winning
# value coincides with default). Gates bridge
# formation strength.

# Cross-anchor bridging remains geometry-limited
# (SourceB=0) — an honest, reported finding.
fusionSimilarityThreshold = 0.90

# Unified trickle settings
enableGtWarmStart         = true
arenaMargin               = 0.004
enableProfiling           = true