# ══════════════════════════════════════════════════════════════════════════
#  thesis_canonical.toml
#  PURPOSE: Canonical thesis parameter configuration (Full MMLU-Pro dataset).
# ══════════════════════════════════════════════════════════════════════════

datasetType   = "MMLU_PRO"
models        = [
    "gpt-4o-2024-08-06",
    "claude-3-5-sonnet-20241022",
    "gemini-1.5-pro-002",
    "deepseek-chat-v2_5",
    "Meta-Llama-3_1-70B-Instruct",
    "Qwen1.5-72B-Chat",
    "gpt-4o-mini",
    "claude-3-5-haiku-20241022",
    "Mixtral-8x7B-Instruct-v0.1",
    "c4ai-command-r-v01",
    "Qwen1.5-14B-Chat",
    "Meta-Llama-3_1-8B-Instruct",
    "gemini-1.5-flash-002",
    "Llama-2-70b-hf",
    "Llama-2-13b-hf",
    "Meta-Llama-3-70B-Instruct"
]
category      = ""
queryLimit    = 0
outputDir     = "experiment_results/thesis_canonical"
testRatio     = 0.3
seed          = 42

# ── Pipeline / evaluation switches ──────────────────────────────────────────
runPipeline    = true
runBenchmark   = false
runTrickle     = true
judgeInduction = false
enableLabeling = false
runBaselines   = true

# ── Mode Switch: DAG_MAX ──────────────────────────────────────────────────────
dagMode = "DAG_MAX"

# ── Formalism Parameters (12-knob thesis set) ─────────────────────────────
maxDepth                  = 8
minClusterSize            = 50
separationEpsilon         = 0.01
routingSoftmaxTau         = 1.50
tauKappaScalingFactor     = 0.0    # Dynamic temperature power gamma (0.0 = unscaled, ablatable via {0.0, 0.5, 1.0})
assignmentCosineGap       = 0.15   # Primary soft-membership margin (governs bridge formation)
deltaAssign               = 1.0    # Residual soft-assignment threshold
emaAlpha                  = 0.7
fusionSimilarityThreshold = 0.90
effectiveSupportFloor     = 2.0
defaultKappaPrior         = 10.0
numIterations             = 35
maxLeafAssignments        = 5
