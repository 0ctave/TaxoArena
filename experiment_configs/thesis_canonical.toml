# ══════════════════════════════════════════════════════════════════════════
#  thesis_canonical.toml — FINAL CANONICAL DAG BUILD
#
#  This config builds the single canonical taxonomy reported in the thesis.
#  It encodes the seed-validated winning configuration on the corrected
#  construction pipeline.
# ══════════════════════════════════════════════════════════════════════════

datasetType   = "MMLU_PRO"

# Evaluated model roster (16 models spanning capability tiers, frontier -> small).
# Held fixed across all conditions; the arena ranks these within each leaf.
models        = [
    "gpt-4o-2024-08-06",
    "claude-3-5-sonnet-20241022",
    "gemini-1.5-pro-002",
    "deepseek-chat-v2_5",
    "Meta-Llama-3_1-70B-Instruct",
    "Qwen1.5-72B-Chat",
    "gpt-4o-mini",
    "claude-3-5-haiku-20241022",
    "Mixtral-8x7B-Instruct-v0.1",
    "c4ai-command-r-v01",
    "Qwen1.5-14B-Chat",
    "Meta-Llama-3_1-8B-Instruct",
    "gemini-1.5-flash-002",
    "Llama-2-70b-hf",
    "Llama-2-13b-hf",
    "Meta-Llama-3-70B-Instruct"
]

category      = ""      # "" = all 14 MMLU-Pro domains (empty = no category filter)
queryLimit    = 0       # 0 = no cap; use the full corpus
outputDir     = "experiment_results/thesis_canonical"
testRatio     = 0.3     # frozen 70/30 stratified split; the 30% held-out pool is
                        # reserved for arena evaluation and excluded from construction
seed          = 42      # construction seed

# ── Pipeline / evaluation switches ──────────────────────────────────────────
runPipeline        = true
runBenchmark       = false
runTrickle         = true          # needed — produces the ECE/routing metrics
runBaselines       = false         # skip for the pilot (save ~90s)
enableFinalMetrics = true          # REQUIRED — you need metrics to validate
enableLabeling     = false         # LLM cluster labeling off for structural build
judgeInduction     = false         # judges are induced in the arena step

# ── Construction mode ───────────────────────────────────────────────────────
dagMode = "DAG_MAX"      # full polyhierarchy: enables bridging (multi-parent nodes)

# ── Formalism parameters ─────────────────────────────────────────────────────
maxDepth              = 8      # max taxonomy depth (caps runaway recursion)
minClusterSize        = 50     # min queries for a node to split further
separationEpsilon     = 0.01   # chance-corrected separation floor for splits/merges

# ── Unified Trickle Routing & Soft-Membership ──────────────────────────────
membershipFloor       = 0.10   # min share of a query's own normalized membership for a leaf to count
routingBeamGamma      = 0.15   # per-level relative beam width (fraction of best sibling responsibility)

# descentMargin: margin for the trickle-routing descent gate.
# A query descends to children iff bestChildDot >= parentDot - descentMargin.
# - Set to 0.0 (default) for strict direction comparison (Option A).
# - Set to a small positive value (e.g., 0.05) to loosen descent and reduce residuals.
# - Set to >= 1.0 (e.g., 2.0) to effectively disable the gate and descend always (Option B).
descentMargin         = 0.0

effectiveSupportFloor = 2.0    # min effective (soft) support for a node to be retained
defaultKappaPrior     = 10.0   # NiW prior concentration when a node has too few points

numIterations         = 35     # max evolution passes. Early-stopping typically fires ~iter 15
maxLeafAssignments    = 5      # max leaves a single query may be softly assigned to during arena evaluation

# ── Merging / convergence ────────────────────────────────────────────────────
fusionSimilarityThreshold = 0.90
enableGtWarmStart         = false  # skips trickle-based reassignment on iteration 1, keeping bootstrap intact

# ── Bridge Analysis & Diagnostics ─────────────────────────────────────────────
secondaryMassFloor        = 2.0    # min secondary probability mass for a bridge assignment to count
bridgeSupportRelFraction  = 0.10   # relative support a bridge must carry vs parent to be admitted
enableProfiling           = true