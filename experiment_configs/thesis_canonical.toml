# ══════════════════════════════════════════════════════════════════════════
#  thesis_canonical.toml
#  PURPOSE: Canonical thesis parameter configuration (Math sub-corpus only).
# ══════════════════════════════════════════════════════════════════════════

datasetType   = "MMLU_PRO"
models        = [
    "gpt-4o-2024-08-06",
    "claude-3-5-sonnet-20241022",
    "gemini-1.5-pro-002",
    "deepseek-chat-v2_5",
    "Meta-Llama-3_1-70B-Instruct",
    "Qwen1.5-72B-Chat",
    "gpt-4o-mini",
    "claude-3-5-haiku-20241022",
    "Mixtral-8x7B-Instruct-v0.1",
    "c4ai-command-r-v01",
    "Qwen1.5-14B-Chat",
    "Meta-Llama-3_1-8B-Instruct",
    "gemini-1.5-flash-002",
    "Llama-2-70b-hf",
    "Llama-2-13b-hf",
    "Meta-Llama-3-70B-Instruct"
]
category      = ""
queryLimit    = 0
outputDir     = "experiment_results/thesis_canonical"
testRatio     = 0.3
seed          = 42

# ── Pipeline / evaluation switches ──────────────────────────────────────────
runPipeline    = true
runBenchmark   = false
runTrickle     = true
judgeInduction = false
enableLabeling = false

# ── Mode Switch: DAG_MAX ──────────────────────────────────────────────────────
dagMode = "DAG_MAX"

# ── Formalism Parameters ──────────────────────────────────────────────────────
maxDepth                  = 8
minClusterSize            = 40
separationEpsilon         = 0.04
routingSoftmaxTau         = 1.50
assignmentCosineGap       = 0.15
deltaAssign               = 0.20
emaAlpha                  = 0.7
fusionSimilarityThreshold = 0.92
effectiveSupportFloor     = 2.0
defaultKappaPrior         = 10.0
secondaryMassFloor        = 0.5
bridgeSupportFloor        = 1.0
bridgeSupportRelFraction  = 0.01
numIterations             = 35
maxLeafAssignments        = 5
