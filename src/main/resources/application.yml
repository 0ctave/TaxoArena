# Classpath base config (ships in the jar). Kept to only what TUI-mode code paths consume:
#   spring.main.web-application-type=none + arc.*.enabled=false  -> run headless, skip the Arc
#     web/GraphQL/chat/script stack (the bulk of startup cost).
#   logging.level.*  -> quiet noisy packages so nothing leaks onto the TUI alt-screen.
# Removed in PR #59: the management/actuator block (no endpoints can be served when headless and
# no code reads management.*).
spring:
  application:
    name: TaxoAdapt
  jackson:
    default-property-inclusion: NON_NULL
  main:
    banner-mode: off
    # The TUI does not use the Arc web server / GraphQL / chat UI. Run headless
    # (no embedded web server) so the app starts fast.
    web-application-type: none
    lazy-initialization: true
  reactor:
    context-propagation: auto
  # Safety net: even if an unused spring-ai MCP server autoconfig sneaks in via a transitive dep,
  # keep it from registering beans under web-application-type=none (caused silent context-start
  # failure before PR #61, which also dropped the spring-ai-starter-mcp-server-webflux dependency).
  autoconfigure:
    exclude:
      - org.springframework.ai.mcp.server.common.autoconfigure.annotations.McpServerAnnotationScannerAutoConfiguration

# Arc web/agent-script stack disabled: the TUI only uses the langchain4j-backed
# LLM client (ChatConfig), not the Arc GraphQL server, chat UI, agent scripts,
# or hot-reload. Disabling these removes the bulk of startup cost.
arc:
  tools:
    query:
      enabled: false
    mutation:
      enabled: false
  cors:
    enabled: false
  scripts:
    enabled: false
    hotReload:
      enable: false
  chat:
    ui:
      enabled: false
  subscriptions:
    events:
      enable: false

logging:
  level:
    root: WARN
    taxonomy: INFO
    org.eclipse.lmos.arc: WARN
    org.springframework: WARN
    io.netty: WARN
    reactor: WARN
# NOTE: the `management:`/actuator block was removed — web-application-type=none means no
# endpoints can be served, and no code reads management.*. See PR #59.
