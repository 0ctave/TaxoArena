#
# Classpath base config (ships in the jar). Kept to only what TUI-mode code paths consume:
#   spring.main.web-application-type=none + arc.*.enabled=false  -> run headless, skip the Arc
#     web/GraphQL/chat/script stack (the bulk of startup cost).
#   logging.level.*  -> quiet noisy packages so nothing leaks onto the TUI alt-screen.
# Removed in PR #59: the management/actuator block. PR #65 then removed the
# actuator/micrometer/opentelemetry/prometheus dependencies entirely from
# build.gradle.kts — they were unused and their PrometheusExemplarsAutoConfiguration
# wired a MetricsTurboFilter onto Logback root that deadlocked early bean init
# against the JVM GC Notification thread (TUI hung at `[BOOT]`).
spring:
  application:
    name: TaxoAdapt
  jackson:
    default-property-inclusion: NON_NULL
  main:
    banner-mode: off
    # The TUI does not use the Arc web server / GraphQL / chat UI. Run headless
    # (no embedded web server) so the app starts fast.
    web-application-type: none
    lazy-initialization: true
  reactor:
    context-propagation: auto

# Arc web/agent-script stack disabled: the TUI only uses the langchain4j-backed
# LLM client (ChatConfig), not the Arc GraphQL server, chat UI, agent scripts,
# or hot-reload. Disabling these removes the bulk of startup cost.
arc:
  tools:
    query:
      enabled: false
    mutation:
      enabled: false
  cors:
    enabled: false
  scripts:
    enabled: false
    hotReload:
      enable: false
  chat:
    ui:
      enabled: false
  subscriptions:
    events:
      enable: false

logging:
  level:
    root: WARN
    taxonomy: INFO
    org.eclipse.lmos.arc: WARN
    org.springframework: WARN
    io.netty: WARN
    reactor: WARN
# NOTE: no `management:` block — web-application-type=none means no endpoints can
# be served, and as of PR #65 the actuator/micrometer/opentelemetry deps are also
# gone from the build, so no autoconfig classes remain to read management.*.

# ── TaxoArena runtime flags (override in application-secret.yml or env vars) ───
#
# taxoadapt.execution.enable-labeling (default: false)
#   Controls whether the LLM post-pass relabeling step runs after convergence.
#
#   false (default) — labels remain as the original MMLU-Pro category names
#     set at bootstrap. All GT anchor lookups (H-F1, NMI, ECE, contamination)
#     use node.originalCategory which is frozen at bootstrap and never changes.
#     Recommended for reproducible experiment runs: metrics are directly
#     comparable across reruns because depth-1 node identity is stable.
#
#   true — the LLM rewrites depth-1 labels post-convergence. node.label is
#     updated but node.originalCategory remains frozen, so GT anchor lookups
#     still resolve correctly (M2/M3 fix, commit 89df4be). Enable only when
#     you need human-readable labels in the exported taxonomy_visualization.json
#     or the TUI, and are not comparing NMI/H-F1 across runs with different
#     label vocabularies.
#
# taxoadapt.execution.enable-live-labeling (default: false)
#   When true, the LLM labels each new cluster immediately after splitting
#   (inline, not post-pass). Higher quality labels but significantly slower
#   iterations. Requires enable-labeling=true to take effect.
#
# taxoadapt:
#   execution:
#     enable-labeling: false
#     enable-live-labeling: false

# ── Azure OpenAI credentials ───────────────────────────────────────────────────
# Read from environment variables so secrets never land in source control.
# Set AZURE_AI_ENDPOINT and AZURE_AI_API_KEY in your .env / shell before
# starting the app. The deployment name comes from taxoadapt.llm.judge-model
# (or labeling-model) at runtime — no separate env var needed.
taxoadapt:
  llm:
    azure:
      endpoint: ${AZURE_AI_ENDPOINT:}
      api-key: ${AZURE_AI_API_KEY:}
