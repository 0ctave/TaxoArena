spring:
  application:
    name: TaxoAdapt
  jackson:
    default-property-inclusion: NON_NULL
  main:
    banner-mode: off
    # The TUI does not use the Arc web server / GraphQL / chat UI. Run headless
    # (no embedded web server) so the app starts fast.
    web-application-type: none
    lazy-initialization: true
  reactor:
    context-propagation: auto

# Arc web/agent-script stack disabled: the TUI only uses the langchain4j-backed
# LLM client (ChatConfig), not the Arc GraphQL server, chat UI, agent scripts,
# or hot-reload. Disabling these removes the bulk of startup cost.
arc:
  tools:
    query:
      enabled: false
    mutation:
      enabled: false
  cors:
    enabled: false
  scripts:
    enabled: false
    hotReload:
      enable: false
  chat:
    ui:
      enabled: false
  subscriptions:
    events:
      enable: false

logging:
  level:
    root: WARN
    org.eclipse.lmos.arc: DEBUG
    org.eclipse.lmos.arc.app: DEBUG
    ArcDSL: DEBUG


management:
  otlp:
    tracing:
      endpoint: http://localhost:6006/v1/traces
  tracing:
    enabled: false
    sampling:
      probability: 1.0
  server:
    port: 9090
  endpoints:
    web:
      base-path: /
      exposure:
        include: prometheus,metrics,info,health
  endpoint:
    metrics:
      enabled: true
    health:
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
